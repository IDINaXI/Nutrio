[build]
builder = "nixpacks"
buildCommand = "curl -fsSL https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.19.3-stable.tar.xz | tar xJ && export PATH=\"$PATH:$PWD/flutter/bin\" && cd nutrio_app && flutter pub get && flutter build web --release && chmod +x start.sh"

[deploy]
startCommand = "./start.sh"
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "always"
restartPolicyMaxRetries = 10 